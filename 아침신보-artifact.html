        const span = document.createElement('span');
        span.textContent = tok.text;
        return span;
      }
      const key = `${fieldKey}-${ti}`;
      const wrap = document.createElement('span');
      wrap.className = 'asb-term' + (state.openTermKey === key ? ' open' : '');
      wrap.textContent = tok.text;
      wrap.addEventListener('click', (e) => { e.stopPropagation(); toggleTerm(key); });
      const tooltip = document.createElement('span');
      tooltip.className = 'asb-term-tooltip';
      tooltip.textContent = GLOSSARY[tok.text];
      wrap.appendChild(tooltip);
      return wrap;
    });
  }

  function render() {
    const idx = state.dateIndex;
    const iso = DATES[idx];
    const hasPrev = idx > 0;
    const hasNext = idx < DATES.length - 1;

    document.getElementById('asbDateLabel').textContent = fmtLabel(iso);
    document.getElementById('asbPrevBtn').disabled = !hasPrev;
    document.getElementById('asbNextBtn').disabled = !hasNext;

    const chipsEl = document.getElementById('asbDateChips');
    chipsEl.innerHTML = '';
    DATES.forEach((d, i) => {
      const btn = document.createElement('button');
      btn.className = 'asb-chip' + (i === idx ? ' active' : '');
      btn.textContent = fmtChip(d);
      btn.addEventListener('click', () => setDate(i));
      chipsEl.appendChild(btn);
    });

    const tabsEl = document.getElementById('asbCategoryTabs');
    tabsEl.innerHTML = '';
    CATEGORIES.forEach((c) => {
      const btn = document.createElement('button');
      btn.className = 'asb-cat-tab' + (c === state.category ? ' active' : '');
      btn.textContent = c;
      btn.addEventListener('click', () => setCategory(c));
      tabsEl.appendChild(btn);
    });

    const all = RAW[iso] || [];
    const filtered = state.category === '전체' ? all : all.filter(a => a.category === state.category);

    const listEl = document.getElementById('asbArticleList');
    const emptyEl = document.getElementById('asbEmptyState');
    listEl.innerHTML = '';

    if (filtered.length === 0) {
      listEl.style.display = 'none';
      emptyEl.style.display = 'block';
    } else {
      listEl.style.display = 'flex';
      emptyEl.style.display = 'none';

      filtered.forEach((a, i) => {
        const articleId = `${iso}-${i}`;
        const imageSrc = placeholderSrc(`${a.category} 기사 사진`);

        const card = document.createElement('article');
        card.className = 'asb-article';

        const row = document.createElement('div');
        row.style.cssText = 'display:flex; gap:20px; align-items:flex-start;';

        const textCol = document.createElement('div');
        textCol.style.cssText = 'flex:1; min-width:0;';

        const meta = document.createElement('div');
        meta.style.cssText = 'display:flex; align-items:baseline; gap:10px; margin-bottom:8px;';
        meta.innerHTML = `
          <span class="asb-meta-cat" style="font-size:11px; letter-spacing:0.15em; color:var(--accent); font-weight:600;">${a.category}</span>
          <span style="font-size:11px; color:var(--muted-2);">·</span>
          <span class="asb-meta-time" style="font-size:12px; color:var(--muted-2); font-variant-numeric:tabular-nums;">${a.time}</span>
        `;

        const h2 = document.createElement('h2');
        h2.style.cssText = 'font-size:24px; font-weight:700; margin:0 0 10px; line-height:1.35; text-wrap:balance;';
        renderTokens(a.title, `${articleId}-title`).forEach(n => h2.appendChild(n));

        const p = document.createElement('p');
        p.className = 'asb-summary';
        p.style.cssText = 'font-size:15.5px; line-height:1.75; color:var(--ink-soft); margin:0; max-width:65ch;';
        renderTokens(a.summary, `${articleId}-summary`).forEach(n => p.appendChild(n));

        textCol.appendChild(meta);
        textCol.appendChild(h2);
        textCol.appendChild(p);
        row.appendChild(textCol);

        if (a.hasImage) {
          const imgSlot = document.createElement('div');
          imgSlot.className = 'asb-img-slot';
          const img = document.createElement('img');
          img.src = imageSrc;
          img.alt = '기사 사진';
          const zoomBtn = document.createElement('button');
          zoomBtn.className = 'asb-zoom-btn';
          zoomBtn.title = '확대 보기';
          zoomBtn.setAttribute('aria-label', '확대 보기');
          zoomBtn.textContent = '🔍';
          zoomBtn.addEventListener('click', () => openLightbox(imageSrc));
          imgSlot.appendChild(img);
          imgSlot.appendChild(zoomBtn);
          row.appendChild(imgSlot);
        }

        card.appendChild(row);
        listEl.appendChild(card);
      });
    }
  }

  document.getElementById('asbPrevBtn').addEventListener('click', () => setDate(state.dateIndex - 1));
  document.getElementById('asbNextBtn').addEventListener('click', () => setDate(state.dateIndex + 1));
  document.getElementById('asb-lightbox').addEventListener('click', closeLightbox);
  document.getElementById('asbCloseLightbox').addEventListener('click', (e) => { e.stopPropagation(); closeLightbox(); });
  document.getElementById('asbLightboxImg').addEventListener('click', (e) => e.stopPropagation());

  render();
})();
</script>
